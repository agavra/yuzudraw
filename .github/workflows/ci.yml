name: CI

on:
  push:
    branches-ignore:
      - site
  pull_request:
    branches-ignore:
      - site

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild \
            -project YuzuDraw.xcodeproj \
            -scheme YuzuDraw \
            -configuration Debug \
            -destination 'platform=macOS' \
            build

      - name: Run Unit Tests
        run: |
          xcodebuild \
            -project YuzuDraw.xcodeproj \
            -scheme YuzuDrawTests \
            -configuration Debug \
            -destination 'platform=macOS' \
            -resultBundlePath YuzuDrawTests.xcresult \
            test

      - name: Run UI Tests
        run: |
          xcodebuild \
            -project YuzuDraw.xcodeproj \
            -scheme YuzuDrawUITests \
            -configuration Debug \
            -destination 'platform=macOS' \
            -resultBundlePath YuzuDrawUITests.xcresult \
            test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-test-results
          path: |
            YuzuDrawTests.xcresult
            YuzuDrawUITests.xcresult
          if-no-files-found: warn
