name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project YuzuDraw.xcodeproj \
            -scheme YuzuDraw \
            -configuration Debug \
            -destination 'platform=macOS' \
            build

      - name: Test
        run: |
          xcodebuild \
            -project YuzuDraw.xcodeproj \
            -scheme YuzuDrawTests \
            -configuration Debug \
            -destination 'platform=macOS' \
            test
