name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Stamp CLI version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i '' "s/0.0.0-dev/$VERSION/" YuzuDrawCLI/Version.swift

      - name: Build CLI for arm64
        run: |
          xcodebuild build \
            -scheme YuzuDrawCLI \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build/arm64 \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build CLI for x86_64
        run: |
          xcodebuild build \
            -scheme YuzuDrawCLI \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build/x86_64 \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY='' \
            CODE_SIGNING_ALLOWED=NO

      - name: Create universal binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_BIN="build/arm64/Build/Products/Release/YuzuDrawCLI"
          X86_BIN="build/x86_64/Build/Products/Release/YuzuDrawCLI"
          mkdir -p build/universal
          lipo -create "$ARM_BIN" "$X86_BIN" -output build/universal/yuzudraw-cli

      - name: Package tarballs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_BIN="build/arm64/Build/Products/Release/YuzuDrawCLI"
          X86_BIN="build/x86_64/Build/Products/Release/YuzuDrawCLI"

          mkdir -p build/dist

          # Per-arch tarballs (for install.sh arch detection)
          cp "$ARM_BIN" build/dist/yuzudraw-cli
          tar -czf "build/dist/yuzudraw-cli-${VERSION}-aarch64-apple-darwin.tar.gz" -C build/dist yuzudraw-cli
          rm build/dist/yuzudraw-cli

          cp "$X86_BIN" build/dist/yuzudraw-cli
          tar -czf "build/dist/yuzudraw-cli-${VERSION}-x86_64-apple-darwin.tar.gz" -C build/dist yuzudraw-cli
          rm build/dist/yuzudraw-cli

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-tarballs
          path: build/dist/*.tar.gz

  build-app:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build universal archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -scheme YuzuDraw \
            -destination 'generic/platform=macOS' \
            -archivePath build/YuzuDraw.xcarchive \
            -configuration Release \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="${{ secrets.CODE_SIGN_IDENTITY }}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R build/YuzuDraw.xcarchive/Products/Applications/YuzuDraw.app build/dmg/
          ln -s /Applications build/dmg/Applications
          VERSION="${GITHUB_REF_NAME#v}"
          hdiutil create \
            -volname YuzuDraw \
            -srcfolder build/dmg \
            -ov \
            -format UDZO \
            "build/YuzuDraw-${VERSION}-universal.dmg"

      - name: Sign DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --sign \
            "${{ secrets.CODE_SIGN_IDENTITY }}" \
            build/YuzuDraw-*.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit build/YuzuDraw-*.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait || {
              echo "==> Notarization failed, fetching log..."
              xcrun notarytool log \
                --apple-id "$APPLE_ID" \
                --team-id "$APPLE_TEAM_ID" \
                --password "$APPLE_APP_PASSWORD" \
                "$(xcrun notarytool history --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" 2>/dev/null | grep -m1 'id:' | awk '{print $2}')" \
                developer_log.json 2>/dev/null && cat developer_log.json || true
              exit 1
            }
          xcrun stapler staple build/YuzuDraw-*.dmg

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dmg
          path: build/YuzuDraw-*-universal.dmg

  release:
    needs: [build-cli, build-app]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-dmg/*
            artifacts/cli-tarballs/*
          generate_release_notes: true
