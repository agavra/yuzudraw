name: YuzuDraw
options:
  bundleIdPrefix: com.agavra
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    GCC_TREAT_WARNINGS_AS_ERRORS: true

packages:
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"
  antlr4:
    url: https://github.com/antlr/antlr4
    from: "4.13.2"

schemes:
  YuzuDraw:
    build:
      targets:
        YuzuDraw: all
        YuzuDrawTests: [test]
        YuzuDrawUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - YuzuDrawTests
        - name: YuzuDrawUITests
          randomExecutionOrder: false
          skipped: true
  YuzuDraw-UITests:
    build:
      targets:
        YuzuDraw: all
        YuzuDrawUITests: [test]
    test:
      config: Debug
      targets:
        - YuzuDrawUITests

targets:
  YuzuDraw:
    type: application
    platform: macOS
    sources:
      - YuzuDraw
    dependencies:
      - sdk: AppIntents.framework
      - package: antlr4
        product: Antlr4
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agavra.YuzuDraw
        INFOPLIST_FILE: YuzuDraw/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_INTENTS_METADATA_GENERATION: false
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: YuzuDraw/Resources/YuzuDraw.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_HARDENED_RUNTIME: true

  YuzuDrawCLI:
    type: tool
    platform: macOS
    sources:
      - YuzuDrawCLI
      - YuzuDraw/Automation
      - YuzuDraw/Models
      - YuzuDraw/Serialization
    dependencies:
      - package: swift-argument-parser
        product: ArgumentParser
      - package: antlr4
        product: Antlr4
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agavra.YuzuDrawCLI
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: NO

  YuzuDrawTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - YuzuDrawTests
    dependencies:
      - target: YuzuDraw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agavra.YuzuDrawTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/YuzuDraw.app/Contents/MacOS/YuzuDraw"
        BUNDLE_LOADER: "$(TEST_HOST)"

  YuzuDrawUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - YuzuDrawUITests
    dependencies:
      - target: YuzuDraw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agavra.YuzuDrawUITests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: YuzuDraw
