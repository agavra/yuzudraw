name: YuzuDraw
options:
  bundleIdPrefix: com.agavra
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  YuzuDraw:
    type: application
    platform: macOS
    sources:
      - YuzuDraw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agavra.YuzuDraw
        INFOPLIST_FILE: YuzuDraw/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: YuzuDraw/Resources/YuzuDraw.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: YuzuDraw/Resources/YuzuDraw.entitlements

  YuzuDrawTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - YuzuDrawTests
    dependencies:
      - target: YuzuDraw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agavra.YuzuDrawTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/YuzuDraw.app/Contents/MacOS/YuzuDraw"
        BUNDLE_LOADER: "$(TEST_HOST)"
