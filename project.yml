name: YuzuDraw
options:
  bundleIdPrefix: com.agavra
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: true
    GCC_TREAT_WARNINGS_AS_ERRORS: true

targets:
  YuzuDraw:
    type: application
    platform: macOS
    sources:
      - YuzuDraw
    dependencies:
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agavra.YuzuDraw
        INFOPLIST_FILE: YuzuDraw/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_INTENTS_METADATA_GENERATION: false
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: YuzuDraw/Resources/YuzuDraw.entitlements
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_HARDENED_RUNTIME: true

  YuzuDrawCLI:
    type: tool
    platform: macOS
    sources:
      - YuzuDrawCLI
      - YuzuDraw/Automation
      - YuzuDraw/Models
      - YuzuDraw/Serialization
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agavra.YuzuDrawCLI
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_ALLOWED: NO

  YuzuDrawTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - YuzuDrawTests
    dependencies:
      - target: YuzuDraw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agavra.YuzuDrawTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/YuzuDraw.app/Contents/MacOS/YuzuDraw"
        BUNDLE_LOADER: "$(TEST_HOST)"
